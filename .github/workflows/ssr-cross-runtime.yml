name: SSR cross-runtime

permissions:
  contents: read

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - development

jobs:
  build:
    name: Build dist
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build library
        run: bun run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  smoke:
    name: ${{ matrix.runtime }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: bun-1.3
          - runtime: node-24
          - runtime: deno-2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Setup Bun
        if: matrix.runtime == 'bun-1.3'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Run smoke test (Bun)
        if: matrix.runtime == 'bun-1.3'
        run: bun tests/cross-runtime/run.mjs

      - name: Setup Node 24
        if: matrix.runtime == 'node-24'
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run smoke test (Node 24)
        if: matrix.runtime == 'node-24'
        run: node tests/cross-runtime/run.mjs

      - name: Setup Deno
        if: matrix.runtime == 'deno-2'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run smoke test (Deno)
        if: matrix.runtime == 'deno-2'
        run: deno run --allow-read --allow-env tests/cross-runtime/run.mjs
