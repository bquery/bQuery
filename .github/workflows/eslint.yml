# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# ESLint is a tool for identifying and reporting on patterns
# found in ECMAScript/JavaScript code.
# More details at https://github.com/eslint/eslint
# and https://eslint.org

name: ESLint

on:
  push:
    branches: ['main', 'development']
  pull_request:
    # The branches below must be a subset of the branches above
    branches: ['main', 'development']
  schedule:
    - cron: '43 16 * * 1'

jobs:
  eslint:
    name: Run eslint scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.7'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        continue-on-error: ${{ github.event_name == 'schedule' }}
        run: |
          bunx eslint . \
            --format json \
            --output-file eslint-results.json

      - name: Convert ESLint results to SARIF
        if: ${{ always() && hashFiles('eslint-results.json') != '' }}
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const path = require('node:path');
          const { pathToFileURL } = require('node:url');

          const eslintResults = JSON.parse(fs.readFileSync('eslint-results.json', 'utf8'));
          const rules = new Map();
          const results = [];
          const workspaceUri = pathToFileURL(`${process.cwd()}${path.sep}`).href;

          for (const file of eslintResults) {
            const resolvedPath = path.resolve(file.filePath);
            const relativePath = path.relative(process.cwd(), resolvedPath).split(path.sep).join('/');

            for (const message of file.messages) {
              const ruleId = message.ruleId ?? 'eslint';

              if (!rules.has(ruleId)) {
                rules.set(ruleId, {
                  id: ruleId,
                  name: ruleId,
                  shortDescription: {
                    text: ruleId,
                  },
                });
              }

              results.push({
                ruleId,
                level: message.severity === 2 || message.fatal === true ? 'error' : 'warning',
                message: {
                  text: message.message,
                },
                locations: [
                  {
                    physicalLocation: {
                      artifactLocation: {
                        uri: relativePath,
                        uriBaseId: 'SRCROOT',
                      },
                      region: {
                        startLine: message.line ?? 1,
                        startColumn: message.column ?? 1,
                        endLine: message.endLine ?? message.line ?? 1,
                        endColumn: message.endColumn ?? message.column ?? 1,
                      },
                    },
                  },
                ],
              });
            }
          }

          const sarif = {
            $schema: 'https://json.schemastore.org/sarif-2.1.0.json',
            version: '2.1.0',
            runs: [
              {
                tool: {
                  driver: {
                    name: 'ESLint',
                    informationUri: 'https://eslint.org',
                    rules: [...rules.values()],
                  },
                },
                originalUriBaseIds: {
                  SRCROOT: {
                    uri: workspaceUri,
                  },
                },
                results,
              },
            ],
          };

          fs.writeFileSync('eslint-results.sarif', JSON.stringify(sarif, null, 2));
          EOF

      - name: Upload analysis results to GitHub
        if: ${{ always() && hashFiles('eslint-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: eslint-results.sarif
          wait-for-processing: true
