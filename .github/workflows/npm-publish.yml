# This workflow runs Bun-based CI, builds docs, publishes the package to npm on releases,
# and deploys the documentation site to GitHub Pages.
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Publish to npm

on:
  release:
    types: [published]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run build

  build-docs:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'
      - run: bun install --frozen-lockfile
      - run: bun run build:docs
      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs/.vitepress/dist

  publish-npm:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v8
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Publish to npm (Trusted Publisher)
        run: npm publish --access public --provenance

  deploy-pages:
    if: github.ref == 'refs/heads/main'
    needs: build-docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
